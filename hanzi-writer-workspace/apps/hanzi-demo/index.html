<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="application-name" content="汉字书写评分" />
    <meta name="apple-mobile-web-app-title" content="汉字书写评分" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>汉字书写评分 · 模式切换</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div class="mode-layout">
      <header class="mode-layout__header">
        <div class="mode-layout__toolbar">
          <div class="mode-layout__brand">
            <span class="mode-layout__eyebrow">汉字书写评分</span>
            <h1>选择模式</h1>
            <p>练习模式用于实时书写评分，测试模式用于逐字测评，上传模式用于整页稿纸提交与结果查看。</p>
          </div>
          <nav class="mode-layout__tabs" aria-label="模式切换">
            <button type="button" class="mode-switch is-active" data-target-page="practice">
              <span class="mode-switch__title">练习模式</span>
              <span class="mode-switch__desc">实时评分</span>
            </button>
            <button type="button" class="mode-switch" data-target-page="test">
              <span class="mode-switch__title">测试模式</span>
              <span class="mode-switch__desc">逐字测评</span>
            </button>
            <button type="button" class="mode-switch" data-target-page="upload">
              <span class="mode-switch__title">上传模式</span>
              <span class="mode-switch__desc">整页上传</span>
            </button>
          </nav>
        </div>
      </header>
      <main class="mode-layout__content">
        <section class="mode-intro" aria-label="模式说明">
          <h2>首页只保留 3 个模式入口</h2>
          <p>点击上方任一模式卡片后，将直接进入对应独立页面。原先展示在首页的模式摘要与状态信息已从正式 UI 移除，仅保留为浏览器控制台中的调试日志。</p>
        </section>
      </main>
    </div>

    <script type="module" src="/src/shell.ts"></script>
  </body>
</html>
