<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>汉字书写评分 · 模式选择</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div class="mode-shell">
      <aside class="mode-shell__nav">
        <div>
          <h1>模式选择</h1>
          <p>选择需要的功能模式，右侧将加载对应的独立页面，互不干扰。</p>
        </div>
        <nav class="mode-shell__nav-list">
          <button type="button" class="mode-switch is-active" data-target-page="practice">书法练习</button>
          <button type="button" class="mode-switch" data-target-page="test">测试评测</button>
          <button type="button" class="mode-switch" data-target-page="upload">稿纸上传</button>
        </nav>
        <p class="mode-shell__hint">默认加载书法练习模式，可随时切换。</p>
      </aside>
      <main class="mode-shell__content">
        <iframe
          id="mode-frame"
          title="Hanzi Writer Mode"
          src="/practice.html"
          loading="lazy"
          allow="clipboard-write"
        ></iframe>
      </main>
    </div>

    <script type="module" src="/src/shell.ts"></script>
  </body>
</html>
