<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>汉字书写评分 · 模式切换</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div class="mode-layout">
      <header class="mode-layout__header">
        <div class="mode-layout__hero">
          <div>
            <span class="mode-layout__eyebrow">模式总控栏</span>
            <h1>汉字书写评分</h1>
            <p>上栏只负责模式选择，下栏只显示当前模式对应的独立页面，从结构上隔离三种模式内容。</p>
          </div>
          <div class="mode-layout__notice">
            <strong>页面结构</strong>
            <span>第 1 栏：模式选择</span>
            <span>第 2 栏：模式页面内容</span>
          </div>
        </div>
        <nav class="mode-layout__tabs">
          <button type="button" class="mode-switch is-active" data-target-page="practice">
            <span class="mode-switch__title">练习模式</span>
            <span class="mode-switch__desc">实时评分、可提示、适合日常练字。</span>
          </button>
          <button type="button" class="mode-switch" data-target-page="test">
            <span class="mode-switch__title">测试模式</span>
            <span class="mode-switch__desc">逐字完成后自动切换，适合测评流程。</span>
          </button>
          <button type="button" class="mode-switch" data-target-page="upload">
            <span class="mode-switch__title">上传模式</span>
            <span class="mode-switch__desc">整页稿纸上传、统一查看任务与结果。</span>
          </button>
        </nav>
        <div class="mode-layout__summary">
          <article class="mode-layout__summary-card">
            <span class="mode-layout__summary-label">当前模式</span>
            <strong id="mode-current-label">练习模式</strong>
            <span id="mode-current-desc">适合日常临摹、纠错与实时评分。</span>
          </article>
          <article class="mode-layout__summary-card">
            <span class="mode-layout__summary-label">独立页面</span>
            <strong id="mode-current-page">practice.html</strong>
            <span id="mode-current-role">当前载入的是独立练习页面</span>
          </article>
          <article class="mode-layout__summary-card">
            <span class="mode-layout__summary-label">页面状态</span>
            <strong id="mode-current-meta">正在加载练习页</strong>
            <span>下方 iframe 只展示当前选中模式。</span>
          </article>
        </div>
      </header>
      <section class="mode-layout__content">
        <div id="mode-loading" class="mode-layout__loading" hidden>
          <span class="mode-layout__spinner" aria-hidden="true"></span>
          <span>正在切换页面内容…</span>
        </div>
        <iframe
          id="mode-frame"
          title="Hanzi Writer Mode"
          src="./practice.html"
          loading="lazy"
          allow="clipboard-write"
        ></iframe>
      </section>
    </div>

    <script type="module" src="/src/shell.ts"></script>
  </body>
</html>
