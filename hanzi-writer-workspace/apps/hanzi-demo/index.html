<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="application-name" content="汉字书写评分" />
    <meta name="apple-mobile-web-app-title" content="汉字书写评分" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>汉字书写评分 · 模式切换</title>
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div class="mode-layout">
      <header class="mode-layout__header">
        <nav class="mode-layout__tabs" aria-label="模式切换">
          <button type="button" class="mode-switch is-active" data-target-page="practice">
            <span class="mode-switch__title">练习模式</span>
          </button>
          <button type="button" class="mode-switch" data-target-page="test">
            <span class="mode-switch__title">测试模式</span>
          </button>
          <button type="button" class="mode-switch" data-target-page="upload">
            <span class="mode-switch__title">上传模式</span>
          </button>
        </nav>
      </header>
      <main class="mode-layout__content">
        <section class="mode-embed" aria-label="模式内容">
          <div id="mode-loading" class="mode-embed__loading" hidden>
            <span class="mode-embed__spinner" aria-hidden="true"></span>
            <span>正在加载模式内容...</span>
          </div>
          <iframe
            id="mode-frame"
            class="mode-embed__frame"
            title="汉字书写评分模式内容"
            src="./practice.html?mode=practice"
            loading="eager"
            allow="clipboard-write"
          ></iframe>
        </section>
      </main>
    </div>

    <script type="module" src="/src/shell.ts"></script>
  </body>
</html>
