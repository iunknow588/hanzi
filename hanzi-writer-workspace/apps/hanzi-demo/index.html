<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hanzi Writer Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app" data-theme="light">
      <div class="controls">
        <h1>Hanzi Writer Demo (Vite)</h1>
        <p>演示 `hanzi-writer-data-client` 的 Hybrid 模式：优先使用本地子集，无匹配时回退 CDN。</p>
        <div class="local-subset">
          <strong>内置字符：</strong>
          <div id="local-chip-list" class="chip-list"></div>
        </div>
        <div class="form-row">
          <div style="flex:1">
            <label for="char-input">Character</label>
            <input id="char-input" maxlength="1" value="我" />
          </div>
          <button id="load-btn">Load</button>
        </div>
        <p id="loader-status" class="status-text"></p>
        <div class="score-panel">
          <div class="score-panel__header">
            <span>综合得分</span>
            <strong id="score-total-value">--</strong>
          </div>
          <ul id="score-strokes" class="score-list">
            <li class="score-pending">等待评分…</li>
          </ul>
        </div>
      </div>
      <div id="writer"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
