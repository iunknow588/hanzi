<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hanzi Writer Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app" data-theme="light">
      <div class="controls">
        <h1>Hanzi Writer Demo (Vite)</h1>
        <p>演示 `hanzi-writer-data-client` 的 Hybrid 模式：优先使用本地子集，无匹配时回退 CDN。</p>
        <div class="local-subset">
          <strong>内置字符：</strong>
          <div id="local-chip-list" class="chip-list"></div>
        </div>
        <div class="form-row">
          <div style="flex:1">
            <label for="char-input">Character</label>
            <input id="char-input" maxlength="1" value="我" />
          </div>
          <button id="load-btn">Load</button>
        </div>
        <p id="loader-status" class="status-text"></p>
        <div class="score-panel">
          <div class="score-panel__header">
            <span>综合得分</span>
            <strong id="score-total-value">--</strong>
          </div>
          <ul id="score-strokes" class="score-list">
            <li class="score-pending">等待评分…</li>
          </ul>
        </div>
        <div class="upload-panel">
          <h2>整页上传评分</h2>
          <p class="upload-panel__hint">上传整页稿纸，交由后端队列调用 Coze 插件评分。</p>
          <form id="upload-form">
            <label for="page-file">稿纸文件</label>
            <input id="page-file" type="file" accept="image/*,.pdf" required />
            <div class="upload-panel__options">
              <div>
                <label for="artifact-level">Artifact 级别</label>
                <select id="artifact-level">
                  <option value="standard">standard</option>
                  <option value="debug">debug</option>
                  <option value="lite">lite</option>
                </select>
              </div>
              <div>
                <label for="score-artifact-level">评分 Artifact</label>
                <select id="score-artifact-level">
                  <option value="standard">standard</option>
                  <option value="debug">debug</option>
                </select>
              </div>
              <div>
                <label for="execution-mode">执行模式</label>
                <select id="execution-mode">
                  <option value="pipeline">pipeline（单体流程）</option>
                  <option value="skills">skills（切分 + 评分）</option>
                </select>
              </div>
            </div>
            <button id="upload-submit" type="submit">上传并排队</button>
          </form>
          <div class="job-list">
            <div class="job-list__header">
              <strong>任务状态</strong>
              <button id="refresh-jobs" type="button" class="btn-secondary">刷新</button>
            </div>
            <p id="job-status-message" class="job-status-message">尚未拉取数据</p>
            <ul id="job-list-entries" class="job-list__items"></ul>
            <div class="job-result" id="job-result-panel">
              <div class="job-result__header">
                <strong id="job-result-title">尚未选择任务</strong>
                <button id="job-result-close" type="button" class="btn-secondary btn-small">清空</button>
              </div>
              <p id="job-result-summary" class="job-result__summary">选择已完成的任务即可查看详情。</p>
              <div class="job-result__metrics" id="job-result-metrics"></div>
              <div class="job-result__cells">
                <table>
                  <thead>
                    <tr>
                      <th>格子</th>
                      <th>字符</th>
                      <th>总体</th>
                      <th>起止</th>
                      <th>走向</th>
                      <th>形态</th>
                    </tr>
                  </thead>
                  <tbody id="job-result-cells">
                    <tr>
                      <td colspan="6" class="job-result__placeholder">暂无数据</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="writer-panel">
        <div id="writer"></div>
        <div class="writer-actions">
          <button id="restart-quiz" type="button" class="btn-secondary btn-small">重新练习</button>
          <label class="hint-toggle">
            <input id="hint-toggle" type="checkbox" checked />
            错笔后显示提示
          </label>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
